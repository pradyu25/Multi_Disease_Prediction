version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vitascan_db
    environment:
      POSTGRES_USER: vitascan
      POSTGRES_PASSWORD: vitascan
      POSTGRES_DB: vitascan_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vitascan -d vitascan_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: vitascan_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://vitascan:vitascan@db:5432/vitascan_db
      - SECRET_KEY=PROD_SECRET_KEY_CHANGE_ME_PLEASE_TO_LONG_HASH
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - UPLOAD_DIR=uploads
      - MODEL_PATH=models/ensemble.joblib
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
