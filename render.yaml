envVarGroups:
  - name: vitascan-shared
    envVars:
      - key: DATABASE_URL
        # Value will be set in the Render Dashboard once
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"

services:
  - type: web
    name: vitascan-ai-backend
    env: docker
    region: ohio
    plan: free
    dockerContext: VitaScanAI/backend
    dockerfilePath: VitaScanAI/backend/Dockerfile
    healthCheckPath: /
    envVars:
      - fromGroup: vitascan-shared
      - key: SERVICE_ROLE
        value: "core"
      - key: USE_LLM
        value: "false"
      - key: RECOMMENDER_URL
        value: "https://vitascan-ai-recommender.onrender.com"
      - key: UPLOAD_DIR
        value: "uploads"

  - type: web
    name: vitascan-ai-recommender
    env: docker
    region: ohio
    plan: free
    dockerContext: VitaScanAI/backend
    dockerfilePath: VitaScanAI/backend/Dockerfile
    healthCheckPath: /
    envVars:
      - fromGroup: vitascan-shared
      - key: SERVICE_ROLE
        value: "recommender"
      - key: USE_LLM
        value: "true"
      - key: HF_MODEL_NAME
        value: "google/flan-t5-small"
